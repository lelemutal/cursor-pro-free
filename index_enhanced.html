<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Financiero</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'dark-bg': '#111827',
            'dark-card': '#1f2937',
            'light-text': '#f3f4f6',
            'medium-text': '#9ca3af',
            'brand-accent': '#38bdf8',
          },
          animation: {
            flash: 'flash 0.7s ease-out',
            fadeIn: 'fadeIn 0.3s ease-out',
            slideInLeft: 'slideInFromLeft 0.5s ease-out',
            float: 'float 3s ease-in-out infinite',
            glow: 'glow 2s ease-in-out infinite',
            shimmer: 'shimmer 2s infinite',
            dash: 'dash 2s linear infinite',
            'gradient-shift': 'gradient-shift 3s ease infinite',
            'particle-float': 'particle-float 6s infinite linear',
            'skeleton-loading': 'skeleton-loading 1.5s infinite',
          },
          keyframes: {
            flash: {
              '0%, 100%': { backgroundColor: 'transparent' },
              '50%': { backgroundColor: 'rgba(56, 189, 248, 0.2)' },
            },
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            slideInFromLeft: {
              '0%': { opacity: '0', transform: 'translateX(-20px)' },
              '100%': { opacity: '1', transform: 'translateX(0)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-5px)' },
            },
            glow: {
              '0%, 100%': { filter: 'drop-shadow(0 0 5px rgba(56, 189, 248, 0.3))' },
              '50%': { filter: 'drop-shadow(0 0 15px rgba(56, 189, 248, 0.6))' },
            },
            shimmer: {
              '0%': { backgroundPosition: '-1000px 0' },
              '100%': { backgroundPosition: '1000px 0' },
            },
            dash: {
              '0%': { strokeDashoffset: '0' },
              '100%': { strokeDashoffset: '-10' },
            },
            'gradient-shift': {
              '0%, 100%': { backgroundPosition: '0% 50%' },
              '50%': { backgroundPosition: '100% 50%' },
            },
            'particle-float': {
              '0%': { transform: 'translateY(100vh) scale(0)', opacity: '1' },
              '10%': { opacity: '1' },
              '90%': { opacity: '1' },
              '100%': { transform: 'translateY(-100px) scale(1)', opacity: '0' },
            },
            'skeleton-loading': {
              '0%': { backgroundPosition: '200% 0' },
              '100%': { backgroundPosition: '-200% 0' },
            },
          },
          backdropBlur: {
            xs: '2px',
          },
          backgroundImage: {
            'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
            'gradient-conic': 'conic-gradient(from 180deg at 50% 50%, var(--tw-gradient-stops))',
          },
          boxShadow: {
            'neon': '0 0 5px rgba(56, 189, 248, 0.3), 0 0 10px rgba(56, 189, 248, 0.3), 0 0 15px rgba(56, 189, 248, 0.3)',
            'neon-strong': '0 0 5px rgba(56, 189, 248, 0.5), 0 0 10px rgba(56, 189, 248, 0.5), 0 0 15px rgba(56, 189, 248, 0.5), 0 0 20px rgba(56, 189, 248, 0.5)',
          },
          textShadow: {
            'neon': '0 0 5px rgba(56, 189, 248, 0.5), 0 0 10px rgba(56, 189, 248, 0.5), 0 0 15px rgba(56, 189, 248, 0.5)',
          },
        },
      },
      plugins: [
        function({ addUtilities }) {
          const newUtilities = {
            '.text-shadow-neon': {
              textShadow: '0 0 5px rgba(56, 189, 248, 0.5), 0 0 10px rgba(56, 189, 248, 0.5), 0 0 15px rgba(56, 189, 248, 0.5)',
            },
            '.glass': {
              background: 'rgba(31, 41, 55, 0.1)',
              backdropFilter: 'blur(10px)',
              border: '1px solid rgba(255, 255, 255, 0.1)',
            },
            '.glass-strong': {
              background: 'rgba(31, 41, 55, 0.3)',
              backdropFilter: 'blur(15px)',
              border: '1px solid rgba(255, 255, 255, 0.15)',
            },
            '.text-gradient': {
              background: 'linear-gradient(135deg, #38bdf8, #0ea5e9, #8b5cf6)',
              '-webkit-background-clip': 'text',
              '-webkit-text-fill-color': 'transparent',
              'background-clip': 'text',
            },
          }
          addUtilities(newUtilities)
        }
      ]
    }
  </script>
  <style>
    /* Custom scrollbar styles */
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(31, 41, 55, 0.5);
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: linear-gradient(to bottom, #38bdf8, #0ea5e9);
      border-radius: 4px;
      border: 1px solid rgba(31, 41, 55, 0.3);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(to bottom, #0ea5e9, #0284c7);
    }
    
    /* Particle background */
    body {
      position: relative;
      overflow-x: hidden;
    }
    
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    
    .particle {
      position: absolute;
      background: rgba(56, 189, 248, 0.1);
      border-radius: 50%;
      pointer-events: none;
      animation: particle-float 8s infinite linear;
    }
    
    /* Enhanced focus styles */
    .focus-enhanced:focus {
      outline: none !important;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.5) !important;
      border-color: #38bdf8 !important;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.1.1/",
    "react/": "https://esm.sh/react@^19.1.1/",
    "react": "https://esm.sh/react@^19.1.1",
    "recharts/": "https://esm.sh/recharts@^3.1.1/",
    "recharts": "https://esm.sh/recharts@^3.1.1",
    "@google/genai": "https://esm.sh/@google/genai"
  }
}
</script>
</head>
<body class="bg-dark-bg text-light-text antialiased relative">
  <!-- Particle background -->
  <div class="particles" id="particles"></div>
  
  <div id="root" style="position: relative; z-index: 10;"></div>
  
  <script>
    // Generate floating particles
    function createParticle() {
      const particle = document.createElement('div');
      particle.className = 'particle';
      
      const size = Math.random() * 4 + 2;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = (Math.random() * 6 + 6) + 's';
      particle.style.animationDelay = Math.random() * 2 + 's';
      
      return particle;
    }
    
    function initParticles() {
      const container = document.getElementById('particles');
      const particleCount = 20;
      
      for (let i = 0; i < particleCount; i++) {
        container.appendChild(createParticle());
      }
      
      // Recreate particles when animation ends
      setInterval(() => {
        if (container.children.length < particleCount) {
          container.appendChild(createParticle());
        }
      }, 2000);
    }
    
    // Initialize particles after DOM loads
    document.addEventListener('DOMContentLoaded', initParticles);
  </script>
</body>
</html>
